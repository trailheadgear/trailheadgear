<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pin 6</title>
<style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e0e0e0}.pin{width:1000px;height:1500px;background:linear-gradient(160deg,#0d3b66 0%,#1a6dad 50%,#2a8dee 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;overflow:hidden;font-family:'Segoe UI',-apple-system,sans-serif}.pin::before{content:'';position:absolute;top:-80px;right:-80px;width:400px;height:400px;background:rgba(255,255,255,.05);border-radius:50%}.pin::after{content:'💧';position:absolute;bottom:80px;left:60px;font-size:200px;opacity:.1}.badge{background:#00D4AA;color:#fff;padding:14px 40px;border-radius:100px;font-size:28px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:50px;z-index:1}.title{color:#fff;font-size:68px;font-weight:900;text-align:center;line-height:1.15;max-width:780px;z-index:1}.subtitle{color:rgba(255,255,255,.85);font-size:34px;margin-top:35px;text-align:center;z-index:1;font-weight:300}.logo{position:absolute;bottom:60px;left:60px;color:rgba(255,255,255,.7);font-size:30px;font-weight:700;z-index:1}</style>
</head>
<body><div class="pin"><div class="badge">Safety First</div><div class="title">Best Water Filters<br>for Camping 2025</div><div class="subtitle">Stop drinking dirty water 💧</div><div class="logo">Trailhead Gear</div></div></body>
</html>
