<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pin — Backpacks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#ddd}
.pin{width:500px;height:750px;display:flex;flex-direction:column;position:relative;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
.top{flex:1;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.top::before{content:'';position:absolute;width:300px;height:300px;background:rgba(255,255,255,.03);border-radius:50%;top:-60px;right:-60px}
.top::after{content:'';position:absolute;width:200px;height:200px;background:rgba(255,255,255,.02);border-radius:50%;bottom:-40px;left:-40px}
.hero-icon{font-size:120px;position:relative;z-index:1;filter:drop-shadow(0 10px 30px rgba(0,0,0,.3))}
.bottom{background:#fff;padding:36px 32px 40px 32px;display:flex;flex-direction:column;gap:14px}
.badge-row{display:flex;gap:10px;flex-wrap:wrap}
.badge-item{background:#f0f4ff;color:#0f3460;padding:6px 14px;border-radius:6px;font-size:14px;font-weight:700}
.cta{background:#FFD814;color:#0F1111;padding:14px 28px;border-radius:24px;font-weight:700;font-size:18px;text-align:center;border:1px solid #FCD200}
.title{font-size:36px;font-weight:900;line-height:1.2;color:#1a1a2e}
.subtitle{font-size:17px;color:#555;line-height:1.5}
.stars{color:#F5A623;font-size:20px;letter-spacing:2px}
</style></head>
<body>
<div class="pin">
<div class="top"><div class="hero-icon">🎒</div></div>
<div class="bottom">
<div class="stars">★★★★★ <span style="color:#888;font-size:16px;font-weight:400">4.7 / 5</span></div>
<div class="title">Best Backpacking Backpacks of 2025</div>
<div class="subtitle">Osprey vs Gregory vs Hyperlite — 8 packs tested side-by-side. Find the one that fits your body (and your budget).</div>
<div class="badge-row"><div class="badge-item">🏆 Best Overall</div><div class="badge-item">💰 Best Value</div><div class="badge-item">⚡ Ultralight Pick</div></div>
<div class="cta">See the Winners →</div>
</div></div>
</body></html>
