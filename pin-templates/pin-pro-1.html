<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pro Pin</title>
<style>
body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e0e0e0}
.pin{width:1000px;height:1500px;background:#1a1a2e;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden;font-family:'Segoe UI',-apple-system,sans-serif}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.85) 100%),url('https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=1000&q=80') center/cover no-repeat}
.overlay{position:relative;z-index:1;padding:0 60px 70px 60px}
.tag{display:inline-block;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);color:#fff;padding:8px 20px;border-radius:100px;font-size:18px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;border:1px solid rgba(255,255,255,.2)}
.title{color:#fff;font-size:58px;font-weight:900;line-height:1.15;margin-bottom:16px;text-shadow:0 2px 20px rgba(0,0,0,.5)}
.sub{color:rgba(255,255,255,.8);font-size:26px;font-weight:400;margin-bottom:24px}
.meta{display:flex;gap:16px;align-items:center}
.score{background:#F5A623;color:#fff;padding:8px 16px;border-radius:8px;font-weight:700;font-size:22px}
.badge{color:rgba(255,255,255,.6);font-size:18px}
.logob{position:absolute;top:50px;left:60px;color:rgba(255,255,255,.8);font-size:24px;font-weight:700;z-index:1}
</style></head>
<body>
<div class="pin"><div class="bg"></div><div class="logob">Trailhead Gear</div><div class="overlay"><div class="tag">2025 Top Pick</div><div class="title">Best Camping Tents<br>After 80+ Hours Testing</div><div class="sub">12 tents. 5 winners. Every budget covered.</div><div class="meta"><div class="score">⭐ 4.8</div><div class="badge">Based on 2,800+ reviews</div></div></div></div>
</body></html>
